; PHP-конфигурация для 1С-Битрикс
; Критичные параметры — без них установщик Bitrix выдаст предупреждения

[PHP]
; Bitrix требует ≥ 256M
memory_limit = 256M

; Битрикс активно читает из POST (формы и редакторы)
post_max_size        = 50M
upload_max_filesize  = 50M
max_input_vars       = 10000

; Отключаем перегрузку функций mbstring — важно для Bitrix!
mbstring.func_overload = 0

[opcache]
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files  = 4000
opcache.revalidate_freq        = 60

[session]
session.save_handler = files
session.save_path    = /tmp
session.cookie_httponly = 1
