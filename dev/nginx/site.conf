server {
    listen 80;
    server_name localhost;

    root  /var/www/html;
    index index.php;
    charset utf-8;

    client_max_body_size 50m;

    # ----- Основной роутинг (Bitrix URL-rewrite) -----------------------
    location / {
        try_files $uri $uri/ /bitrix/urlrewrite.php$is_args$args;
    }

    # ----- PHP-FPM ------------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass            php:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout    300;
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
        include                 fastcgi_params;
    }

    # ----- Bitrix AJAX (явный fastcgi для ajax.php) --------------------
    location = /bitrix/services/main/ajax.php {
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;
    }

    # ----- Безопасность -------------------------------------------------
    # Запрещаем прямой HTTP-доступ к PHP-файлам в служебных папках Bitrix.
    # Без этих правил lib/*.php в /local/modules/ были бы доступны напрямую.
    location ~* ^/bitrix/(modules|local_cache|stack_cache|managed_cache|php_interface)/ {
        deny all;
    }

    # Блокируем прямой доступ к файлам модулей в /local/modules/
    # (AJAX идёт через /bitrix/services/main/ajax.php — этот блок ему не мешает)
    location ~* ^/local/modules/ {
        deny all;
    }

    # Скрытые файлы и служебные расширения
    location ~ /\.(ht|git|env) { deny all; }
    location ~ \.settings\.php$ { deny all; }

    # ----- Статика (кеш браузера) ---------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        log_not_found off;
        access_log    off;
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { allow all; log_not_found off; access_log off; }
}
